<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Moje_radio-hodiny</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: -apple-system-short-condensed, -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; height: 100vh; width: 100vw; overflow: hidden;
            -webkit-user-select: none; user-select: none; }

        /* --- REŽIM RÁDIO --- */
        .clock-section { flex: 1.5; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border-right: 1px solid #222; transition: all 0.5s ease-in-out; position: relative; }
        
        #time { font-size: 24vw; line-height: 0.8; letter-spacing: -4px; display: flex; align-items: baseline; 
                  transform: scaleY(1.05); transform-origin: center; }
        .hours-part { font-weight: 600; color: #ffffff; } 
        .minutes-part { font-weight: 200; color: #ffffff; margin-left: 5px; } 
        .red-digit { color: #eb0028 !important; } 
        
        #weather-temp-mini { font-size: 8vw; font-weight: 300; margin-top: 15px; } 
        .ss-only { display: none !important; }

        #spotify-links-container { display: none; margin-top: 15px; width: 85%; background: #0a0a0a; border-radius: 12px; padding: 10px; border: 1px solid #222; }
        .bt-mini-link { margin-top: 10px; color: #87CEEB; font-size: 32px; text-decoration: none; opacity: 0.6; }

        .buttons-section { flex: 1.1; display: grid; grid-template-columns: 1fr 1fr; 
            grid-template-rows: 0.7fr 1fr 1fr; gap: 8px; padding: 10px; background: #050505; }
        .btn { display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: none; background: #151515; color: white; border-radius: 18px; cursor: pointer; }
        .vypni { background-color: #333; grid-column: span 2; }
        .vypni i { color: #eb0028; font-size: 65px; }
        .spotify { background-color: #198c47; }
        .spotify i { font-size: 60px; }
        .playing { border: 2px solid #fff !important; }

        /* --- ŠETRIČ (METEOSTANICA) --- */
        body.screensaver-mode .buttons-section { display: none; }
        body.screensaver-mode .ss-hide { display: none !important; }
        body.screensaver-mode .ss-only { display: flex !important; }

        body.screensaver-mode .clock-section { 
            flex: 1; border: none; display: grid; grid-template-columns: 1.3fr 0.7fr; align-items: stretch;
        }

        .ss-left-col { display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 1px solid #1a1a1a; padding-bottom: 2vh; }
        body.screensaver-mode #time { font-size: 34vw; transform: scaleY(1.15); margin-bottom: 4vh; }
        
        #date-block { display: flex; align-items: center; justify-content: center; width: 100%; gap: 30px; margin-top: 8vh; }
        .ss-moon { font-size: 8vw; color: #333; } /* Sivý nenápadný mesiac */
        .ss-date-wrapper { display: flex; align-items: baseline; gap: 15px; }
        .ss-date { font-size: 11vw; font-weight: 300; color: #fff; }
        .ss-day { font-size: 8vw; font-weight: 200; color: #aaa; text-transform: uppercase; }

        .ss-right-col { display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; gap: 6vh; }
        .meteo-icon-large { font-size: 18vw; color: #ffcc00; }
        
        .temp-group { text-align: center; width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .temp-val { font-size: 16vw; font-weight: 300; line-height: 0.9; color: #fff; }
        .temp-hum { font-size: 7vw; color: #fff; font-weight: 200; opacity: 0.8; }
    </style>
</head>
<body id="mainBody">

    <audio id="audioPlayer" preload="none" playsinline></audio>

    <div class="clock-section">
        <div class="ss-left-col">
            <div id="time">
                <span id="h-part" class="hours-part">00</span>
                <span id="m-part" class="minutes-part">00</span>
            </div>
            
            <div id="weather-temp-mini" class="ss-hide">--°C</div>
            <a href="shortcuts://run-shortcut?name=PripojRepro" class="bt-mini-link ss-hide">
                <i class="fa-brands fa-bluetooth-b"></i>
            </a>

            <div id="spotify-links-container" class="ss-hide">
                <div style="display: flex; justify-content: space-around; gap: 10px;">
                    <button onclick="openSpotify('67q2IYkPShkkWCbV14rRil')" style="background:none; border:none; color:white; font-size:26px;">Jaja🎵</button>
                    <button onclick="openSpotify('63bq913mo2Dv0KIOnnUzam')" style="background:none; border:none; color:white; font-size:24px;">🎸</button>
                    <button onclick="openSpotify('2xLrXn0HleL3pJvnRWnRcJ')" style="background:none; border:none; color:white; font-size:24px;">🔥</button>
                    <button onclick="openSpotify('search')" style="background:none; border:none; color:white; font-size:26px;">🔍</button>
                </div>
            </div>

            <div id="date-block" class="ss-only">
                <i id="moon-icon" class="fas fa-circle ss-moon"></i>
                <div class="ss-date-wrapper">
                    <span id="date-display" class="ss-date">--.--.</span>
                    <span id="day-display" class="ss-day">---</span>
                </div>
            </div>
        </div>

        <div class="ss-right-col ss-only">
            <div class="temp-group">
                <i id="weather-icon-main" class="fas fa-sun meteo-icon-large"></i>
                <div class="temp-val" id="outdoor-temp">--°C</div>
                <div class="temp-hum" id="outdoor-hum">--%</div>
            </div>
        </div>
    </div>

    <div class="buttons-section">
        <button onclick="stopRadio()" class="btn vypni"><i class="fa-solid fa-power-off"></i></button>
        <button onclick="playRadio('https://icecast.stv.livebox.sk/slovensko_128.mp3', this, 'slovensko')" class="btn rozhlas" style="background:#007bc4; font-size:30px; font-weight:800;">SRo</button>
        <button onclick="playRadio('https://stream.funradio.sk/fun128.mp3', this, 'fun')" class="btn fun" style="background:#b53a65;"><img src="https://www.funradio.sk/img/vue/icons/funRadioLogo.svg" style="height:40%;"></button>
        <button onclick="playRadio('https://stream.bauermedia.sk/rock-hi.mp3', this, 'rock')" class="btn rock" style="background:#222;"><img src="https://radiorock.sk/logo.svg" class="white-logo" style="height:40%;"></button>
        <button onclick="showSpotify()" class="btn spotify"><i class="fa-brands fa-spotify"></i></button>
    </div>

    <script>
    const VOLUME_MAP = { 'slovensko': 0.4, 'fun': 1.0, 'rock': 0.5 };

    function updateClock() {
        const now = new Date();
        const daysShort = ['Ned', 'Pon', 'Uto', 'Str', 'Štv', 'Pia', 'Sob'];
        
        let h = String(now.getHours()).padStart(2, '0');
        let m = String(now.getMinutes()).padStart(2, '0');
        
        // ČERVENÁ LEN PRVÁ CIFRA AK JE TO 1
        let h_display = h;
        if (h[0] === '1') {
            h_display = `<span class="red-digit">1</span>${h.substring(1)}`;
        }
        
        document.getElementById('h-part').innerHTML = h_display;
        document.getElementById('m-part').textContent = m;
        
        // DÁTUM A DEŇ
        document.getElementById('date-display').textContent = `${now.getDate()}.${now.getMonth() + 1}.`;
        document.getElementById('day-display').textContent = daysShort[now.getDay()];
        
        updateMoonPhase(now);
    }
    setInterval(updateClock, 1000); updateClock();

    function updateMoonPhase(date) {
        const lp = 2551443; 
        const new_moon = new Date(1970, 0, 7, 20, 35, 0);
        const phase = ((date.getTime() - new_moon.getTime()) / 1000) % lp;
        const res = Math.floor(phase / (24 * 3600));
        let icon = res < 2 ? "fa-circle" : (res < 14 ? "fa-circle-half-stroke" : "fa-solid fa-circle");
        document.getElementById('moon-icon').className = `fas ${icon} ss-moon`;
    }

    async function updateWeather() {
        try {
            const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=48.1486&longitude=17.1077&current=temperature_2m,relative_humidity_2m,weather_code&daily=weather_code&timezone=Europe%2FBratislava`);
            const d = await r.json();
            
            document.getElementById('weather-temp-mini').textContent = Math.round(d.current.temperature_2m) + '°C';
            document.getElementById('outdoor-temp').textContent = Math.round(d.current.temperature_2m) + '°C';
            document.getElementById('outdoor-hum').textContent = Math.round(d.current.relative_humidity_2m) + '%';
            
            // LOGIKA PREDPOVEDE: dopoludnia dnes, popoludní zajtra
            const hour = new Date().getHours();
            const iconIndex = (hour < 12) ? 0 : 1;
            const forecastCode = d.daily.weather_code[iconIndex];
            
            const codes = { 0: 'fa-sun', 1: 'fa-cloud-sun', 3: 'fa-cloud', 61: 'fa-cloud-rain', 95: 'fa-bolt' };
            document.getElementById('weather-icon-main').className = 'fas ' + (codes[forecastCode] || 'fa-cloud') + ' meteo-icon-large';
        } catch (e) {}
    }
    updateWeather(); setInterval(updateWeather, 1800000);

    const audio = document.getElementById('audioPlayer');
    function playRadio(url, element, type) {
        document.getElementById('spotify-links-container').style.display = 'none';
        document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('playing'));
        audio.volume = VOLUME_MAP[type] || 1.0;
        audio.src = url; audio.play();
        element.classList.add('playing');
        resetIdleTimer();
    }
    function stopRadio() {
        audio.pause(); audio.src = "";
        document.getElementById('spotify-links-container').style.display = 'none';
        document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('playing'));
        resetIdleTimer();
    }
    function showSpotify() {
        stopRadio();
        document.getElementById('spotify-links-container').style.display = 'block';
        document.querySelector('.spotify').classList.add('playing');
        resetIdleTimer();
    }
    function openSpotify(id) {
        let url = id === 'search' ? "https://open.spotify.com/search" : `https://open.spotify.com/playlist/${id}`;
        window.open(url, '_blank');
    }

    let idleTimer;
    function resetIdleTimer() {
        document.body.classList.remove('screensaver-mode');
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => document.body.classList.add('screensaver-mode'), 25000);
    }
    document.addEventListener('touchstart', resetIdleTimer);
    resetIdleTimer();
    </script>
</body>
</html>
