<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Radio Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh; width: 100vw; overflow: hidden;
            -webkit-user-select: none; user-select: none;
            position: relative; }

        /* ĽAVÁ STRANA (HODINY A INFO) */
        .clock-section { 
            position: absolute; left: 0; top: 0; bottom: 0;
            width: 50%; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            border-right: 1px solid #222; 
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1); 
            z-index: 10; background: #000; }
        
        #time { font-size: min(22vw, 55vh); line-height: 0.8; letter-spacing: -4px; 
            margin-bottom: 2vh; display: flex; align-items: baseline; 
            transition: all 0.8s ease; cursor: pointer; }
        .hours-part { font-weight: 600; color: #ffffff; } 
        .minutes-part { font-weight: 300; color: #ffffff; margin-left: 10px; } 
        .red-digit { color: #eb0028 !important; } 
        
        .weather-section { display: flex; align-items: center; gap: 15px; transition: all 0.8s ease; }
        #weather-temp { font-size: 7vw; font-weight: 300; } 
        #weather-icon { font-size: 7vw; color: #ffcc00; }

        #song-container { margin-top: 10px; padding: 8px 15px; background: #0a0a0a; border-radius: 12px;
            text-align: center; color: #1db954; font-weight: 700; display: none; 
            max-width: 85%; border: 1px solid #222; }
        #current-song { font-size: 2.2vw; display: block; white-space: nowrap; 
            overflow: hidden; text-overflow: ellipsis; max-width: 40vw; }

        /* PRAVÁ STRANA (TLAČIDLÁ) */
        .buttons-section { 
            position: absolute; right: 0; top: 0; bottom: 0;
            width: 50%; display: grid; grid-template-columns: 1fr 1fr; 
            grid-template-rows: 0.7fr 1fr 1fr; gap: 8px; padding: 10px; 
            background: #050505; box-sizing: border-box;
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1); z-index: 5; }

        .btn { display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: none; background: #151515; color: white; border-radius: 18px; cursor: pointer; }
        .vypni { background-color: #333; grid-column: span 2; }
        .vypni i { color: #eb0028; font-size: 60px; }
        .rozhlas { background-color: #007bc4; } 
        .fun { background-color: #b53a65; }
        .rock { background-color: #222222; }
        .spotify { background-color: #198c47; }
        .spotify i { font-size: 55px; }
        .btn img { max-height: 45%; max-width: 80%; object-fit: contain; }
        .white-logo { filter: brightness(0) invert(1); }
        .playing { border: 2px solid #fff !important; }

        /* PREDPOVEĎ */
        #forecast-container { display: none; position: absolute; top: 15%; left: 5%; width: 45%; 
            background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px); border-radius: 18px; 
            border: 1px solid #333; padding: 15px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }

        /* SPOTIFY PANEL */
        #spotify-links-container { display: none; margin-top: 10px; width: 90%; background: #0a0a0a; border-radius: 12px; padding: 15px 5px; }
        .bt-mini-link { margin-top: 15px; color: #87CEEB; font-size: 25px; text-decoration: none; opacity: 0.4; }

        /* ŠETRIČ REŽIM */
        body.screensaver-active .buttons-section { transform: translateX(100%); opacity: 0; }
        body.screensaver-active .clock-section { width: 100%; border-right: none; }
        body.screensaver-active #time { font-size: min(35vw, 70vh); }
        body.screensaver-active .weather-section { transform: scale(1.3); }
        body.screensaver-active #song-container, body.screensaver-active #spotify-links-container, body.screensaver-active .bt-mini-link { opacity: 0; visibility: hidden; }
    </style>
</head>
<body id="mainBody">
    <audio id="audioPlayer" preload="none" playsinline></audio>

    <div class="clock-section">
        <div id="time" onclick="handleClockClick(event)">
            <span id="h-part" class="hours-part">00</span>
            <span id="m-part" class="minutes-part">00</span>
        </div>
        <div class="weather-section" onclick="toggleForecast(event)" style="cursor: pointer;">
            <i id="weather-icon" class="fas fa-sun"></i>
            <span id="weather-temp">--°C</span>
        </div>
        <div id="forecast-container">
            <div id="forecast-days" style="display: flex; flex-direction: column; gap: 12px;"></div>
        </div>
        <div id="song-container">
            <span id="current-song">Zisťujem...</span>
        </div>
        <div id="spotify-links-container">
            <div style="display: flex; justify-content: space-around; flex-wrap: wrap; gap: 10px;">
                <button onclick="openSpotify('67q2IYkPShkkWCbV14rRil')" style="background: none; border: none; color: white; font-size: 20px;">🎵Janka</button>
                <button onclick="openSpotify('63bq913mo2Dv0KIOnnUzam')" style="background: none; border: none; color: white; font-size: 20px;">Domko🎸</button>
                <button onclick="openSpotify('2xLrXn0HleL3pJvnRWnRcJ')" style="background: none; border: none; color: white; font-size: 20px;">Rock🔥</button>
                <button onclick="openSpotify('search')" style="background: none; border: none; color: white; font-size: 20px;">🔍Hľadať</button>
            </div>
        </div>
        <a href="shortcuts://run-shortcut?name=PripojRepro" class="bt-mini-link"><i class="fa-brands fa-bluetooth-b"></i></a>
    </div>

    <div class="buttons-section">
        <button onclick="stopRadio(event)" class="btn vypni"><i class="fa-solid fa-power-off"></i></button>
        <button onclick="playRadio('https://icecast.stv.livebox.sk/slovensko_128.mp3', this, 'slovensko')" class="btn rozhlas">
            <div style="display: flex; align-items: center; font-size: 38px; font-weight: 800;">
                <div style="display: flex; flex-direction: column; gap: 4px; margin-right: 6px;">
                    <span style="width: 8px; height: 8px; background: white; border-radius: 50%;"></span>
                    <span style="width: 8px; height: 8px; background: white; border-radius: 50%;"></span>
                </div>SRo
            </div>
        </button>
        <button onclick="playRadio('https://stream.funradio.sk/fun128.mp3', this, 'fun')" class="btn fun"><img src="https://www.funradio.sk/img/vue/icons/funRadioLogo.svg" alt="Fun"></button>
        <button onclick="playRadio('https://stream.bauermedia.sk/rock-hi.mp3', this, 'rock')" class="btn rock"><img src="https://radiorock.sk/logo.svg" alt="Rock" class="white-logo"></button>
        <button onclick="showSpotify()" class="btn spotify"><i class="fa-brands fa-spotify"></i></button>
    </div>

    <script>
    const audio = document.getElementById('audioPlayer');
    const body = document.getElementById('mainBody');
    let currentActiveRadio = null, idleTimer;

    function updateClock() {
        const n = new Date();
        const h = String(n.getHours()).padStart(2, '0');
        const m = String(n.getMinutes()).padStart(2, '0');
        document.getElementById('h-part').innerHTML = h.replace(/1/g, '<span class="red-digit">1</span>');
        document.getElementById('m-part').textContent = m;
    }
    setInterval(updateClock, 1000); updateClock();

    function playRadio(url, el, type) {
        document.getElementById('spotify-links-container').style.display = 'none';
        currentActiveRadio = type;
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('playing'));
        body.classList.add('is-playing');
        audio.volume = ({'slovensko': 0.4, 'fun': 1.0, 'rock': 0.5})[type] || 1.0;
        audio.src = url; audio.play().then(() => { el.classList.add('playing'); updateMetadata(); });
        resetIdleTimer();
    }

    function stopRadio(e) { if(e) e.stopPropagation(); currentActiveRadio = null; audio.pause(); audio.src = "";
        body.classList.remove('is-playing'); document.querySelectorAll('.btn').forEach(b => b.classList.remove('playing'));
        document.getElementById('song-container').style.display = 'none';
        document.getElementById('spotify-links-container').style.display = 'none';
        resetIdleTimer();
    }

    async function updateMetadata() {
        if (!currentActiveRadio) return;
        const api = currentActiveRadio === 'slovensko' ? "https://shoutcast.rtvs.sk/json/slovensko-current.json" : (currentActiveRadio === 'fun' ? "https://api.funradio.sk/playlist/current" : "https://api.bauermedia.sk/v1/stations/rock/current-song");
        try {
            const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(api + "?cb=" + Date.now())}`);
            const d = await r.json(); const j = JSON.parse(d.contents);
            let t = (currentActiveRadio === 'fun') ? ((Array.isArray(j) ? j[0] : j).artist ? `${(Array.isArray(j) ? j[0] : j).artist} - ${(Array.isArray(j) ? j[0] : j).title}` : "") : (j.artist ? `${j.artist} - ${j.title}` : "");
            document.getElementById('current-song').textContent = t || currentActiveRadio;
        } catch (e) {}
    }
    setInterval(updateMetadata, 15000);

    async function updateWeather() {
        try {
            const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=48.1486&longitude=17.1077&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Europe%2FBratislava`);
            const d = await r.json();
            document.getElementById('weather-temp').textContent = Math.round(d.current_weather.temperature) + '°C';
            const codes = { 0: 'fa-sun', 1: 'fa-cloud-sun', 2: 'fa-cloud-sun', 3: 'fa-cloud', 45: 'fa-smog', 51: 'fa-cloud-rain', 61: 'fa-cloud-showers-heavy', 71: 'fa-snowflake', 95: 'fa-bolt' };
            document.getElementById('weather-icon').className = 'fas ' + (codes[d.current_weather.weathercode] || 'fa-cloud');
            let h = ""; const days = ['Ne', 'Po', 'Ut', 'St', 'Št', 'Pi', 'So'];
            for(let i=0; i<5; i++) {
                let dt = new Date(d.daily.time[i]);
                h += `<div style="display: flex; justify-content: space-between; align-items: center; font-size: 26px;">
                        <span style="width: 50px;">${i===0?"Dnes":days[dt.getDay()]}</span>
                        <i class="fas ${codes[d.daily.weathercode[i]]||'fa-cloud'}" style="color:#ffcc00; width:40px; text-align:center;"></i>
                        <span>${Math.round(d.daily.temperature_2m_min[i])}°/<b>${Math.round(d.daily.temperature_2m_max[i])}°</b></span>
                    </div>`;
            }
            document.getElementById('forecast-days').innerHTML = h;
        } catch (e) {}
    }
    updateWeather(); setInterval(updateWeather, 1800000);

    function goToSleep() { body.classList.add('screensaver-active'); document.getElementById('forecast-container').style.display='none'; }
    function wakeUp() { body.classList.remove('screensaver-active'); resetIdleTimer(); }
    function resetIdleTimer() { clearTimeout(idleTimer); idleTimer = setTimeout(goToSleep, 30000); }
    
    function handleDocumentInteraction() { if (body.classList.contains('screensaver-active')) { wakeUp(); } else { resetIdleTimer(); } }
    
    function handleClockClick(e) { 
        if (body.classList.contains('screensaver-active')) { wakeUp(); } 
        else { e.stopPropagation(); goToSleep(); } 
    }

    function toggleForecast(e) { e.stopPropagation(); const c = document.getElementById('forecast-container'); c.style.display = c.style.display==='none'?'block':'none'; resetIdleTimer(); }
    function showSpotify() { stopRadio(); document.getElementById('spotify-links-container').style.display = 'block'; body.classList.add('is-playing'); resetIdleTimer(); }
    function openSpotify(id) { window.open(id === 'search' ? "https://open.spotify.com/search" : `https://open.spotify.com/playlist/${id}`, '_blank'); }

    document.addEventListener('touchstart', handleDocumentInteraction);
    document.addEventListener('click', handleDocumentInteraction);
    goToSleep();
</script>
</body>
</html>
